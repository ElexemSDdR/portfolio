<article
  class="flex flex-col rounded-4xl pb-2 overflow-hidden bg-[#12141f] relative shadow-[0_0_16px_#121212] animate-range-[entry_0%_cover_25%] timeline-view hover:scale-105 hover:z-30 hover:-translate-y-2 active:scale-105 active:z-30 active:-translate-y-2 transition-transform {{
    animateSide()
  }}"
>
  <a href="{{ project().url }}" target="_blank" class="relative">
    <img
      src="{{ project().previewImage }}"
      alt="Imágen de vista previa para {{ project().title }}"
      loading="lazy"
      class="aspect-video h-auto"
    />
    <div
      class="absolute transition-colors bottom-0 left-0 w-full h-full bg-linear-to-b from-transparent to-[#12141f] hover:bg-black/20 active:bg-black/20"
    ></div>
  </a>
  <h4
    class="text-xl xl:text-3xl px-4 my-2 mt-3 font-bold hover:text-blue-400 active:text-blue-400 transition-colors"
  >
    <a href="{{ project().url }}" target="_blank">{{ project().title }}</a>
  </h4>
  @if (project().github) {
    <a
      href="{{ project().github }}"
      target="_blank"
      rel="noopener noreferrer"
      class="group flex w-fit items-center gap-2 mb-3 px-2 mx-4 py-2 rounded-full border-zinc-800 bg-zinc-950 text-zinc-400 hover:text-white hover:bg-zinc-900 hover:border-zinc-900 transition-all duration-300 hover:scale-105 active:scale-95 shadow-[2px_3px_5px_black,3px_4px_15px_-10px_#52525c_inset] hover:shadow-[2px_3px_20px_black,3px_4px_15px_-10px_#52525c_inset] active:shadow-[2px_3px_20px_black,3px_4px_15px_-10px_#52525c_inset] active:bg-zinc-900 active:border-zinc-900"
    >
      <span class="transition-transform group-hover:rotate-12">
        <app-icons name="github"></app-icons>
      </span>
      <span class="text-xs font-medium">Repositorio</span>
    </a>
  }
  <p class="px-4 text-sm font-light text-gray-300 text-pretty">{{ project().description }}</p>
  <div class="h-px w-[95%] mx-auto bg-white/55 rounded-full my-4"></div>
  <ul class="flex gap-2 px-4 mb-2 flex-wrap">
    @for (technology of project().technologies; track technology) {
      <li
        class="rounded-full border-2 text-gray-300 py-1 px-3 text-sm align-middle text-center {{
          bgColorForTechnology(technology.toLowerCase())
        }}"
      >
        {{ technology }}
      </li>
    }
  </ul>
</article>
